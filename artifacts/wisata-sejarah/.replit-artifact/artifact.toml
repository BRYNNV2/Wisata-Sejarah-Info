kind = "mobile"
previewPath = "/"
title = "Wisata Sejarah GIS"
version = "1.0.0"
id = "artifacts/wisata-sejarah"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19481

[services.development]
run = "pnpm --filter @workspace/wisata-sejarah run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wisata-sejarah", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/wisata-sejarah", "run", "serve" ]

[services.env]
PORT = "19481"
BASE_PATH = "/"
